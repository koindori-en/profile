<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로필 페이지</title>
    <!-- Tailwind CSS (스타일링을 위한 프레임워크) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome (아이콘) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 폰트 적용 (Pretendard) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        }
        
        /* 배경 이미지 애니메이션 (천천히 줌인/줌아웃) */
        @keyframes kenburns {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }
        .bg-animate {
            animation: kenburns 20s ease-in-out infinite alternate;
        }

        /* 카드 부유 애니메이션 (위아래로 둥둥 떠다니는 효과) */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .card-float {
            animation: float 6s ease-in-out infinite;
        }

        /* 버튼 반짝임 효과 (Hover 시 빛이 지나가는 효과) */
        .btn-shine {
            position: relative;
            overflow: hidden;
        }
        .btn-shine::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 20%;
            height: 200%;
            background: rgba(255, 255, 255, 0.4);
            transform: rotate(30deg);
            transition: all 0.6s ease;
        }
        .btn-shine:hover::after {
            left: 120%;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden bg-black">

    <!-- 동적 배경 이미지 -->
    <div class="absolute inset-0 z-0 overflow-hidden">
        <div class="absolute inset-0 bg-[url('1000007608.jpg')] bg-cover bg-center bg-no-repeat bg-animate"></div>
        <!-- 가독성을 위한 어두운 오버레이 및 블러 -->
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
    </div>

    <!-- 메인 프로필 카드 (글래스모피즘) -->
    <div class="relative z-10 bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl p-8 shadow-2xl max-w-md w-full mx-4 text-white card-float">
        
        <!-- 프로필 사진 (배경과 통일성을 주며 은은하게 빛나는 효과 추가) -->
        <div class="flex justify-center mb-6">
            <div class="relative">
                <div class="absolute inset-0 bg-gradient-to-tr from-slate-400 to-slate-200 rounded-full blur animate-pulse opacity-50"></div>
                <img src="1000007608.jpg" alt="프로필 사진" 
                     class="relative w-28 h-28 rounded-full border-2 border-white/50 object-cover shadow-lg">
            </div>
        </div>
        
        <!-- 인적사항 및 직분 -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold mb-2 tracking-tight">새제천교회 담임목사</h1>
            <p class="text-lg font-medium text-gray-300 tracking-wider">Pastor Profile</p>
        </div>
        
        <!-- 학력 정보 -->
        <div class="bg-black/30 rounded-2xl p-5 mb-8 border border-white/10 shadow-inner">
            <h2 class="text-sm font-semibold text-gray-300 mb-4 flex items-center uppercase tracking-widest">
                <i class="fa-solid fa-graduation-cap mr-2 text-slate-300"></i> 학력 및 약력
            </h2>
            <ul class="text-gray-200 space-y-3 font-medium">
                <li class="flex items-center">
                    <span class="w-1.5 h-1.5 rounded-full bg-slate-300 mr-3"></span>
                    총신대학원 M.Div
                </li>
                <li class="flex items-center">
                    <span class="w-1.5 h-1.5 rounded-full bg-slate-400 mr-3"></span>
                    스텔렌보쉬 대학교 구약 M.TH
                </li>
            </ul>
        </div>
        
        <!-- 링크 버튼 모음 -->
        <div class="space-y-4">
            <!-- 교회 홈페이지 링크 -->
            <a href="https://saejecheon.com" target="_blank" rel="noopener noreferrer" 
               class="btn-shine flex items-center justify-center w-full bg-gradient-to-r from-slate-700/80 to-slate-800/80 hover:from-slate-600 hover:to-slate-700 text-white font-bold py-4 px-6 rounded-2xl transition-all duration-300 shadow-[0_4px_15px_rgba(0,0,0,0.3)] hover:shadow-[0_8px_25px_rgba(0,0,0,0.5)] border border-white/10 hover:-translate-y-1 hover:scale-[1.02]">
                <i class="fa-solid fa-church mr-2 text-xl"></i> 
                <span class="text-lg tracking-wide">새제천교회</span>
            </a>
            
            <!-- 유튜브 채널 링크 -->
            <a href="https://www.youtube.com/@koclass" target="_blank" rel="noopener noreferrer" 
               class="btn-shine flex items-center justify-center w-full bg-gradient-to-r from-red-600/80 to-red-800/80 hover:from-red-500 hover:to-red-700 text-white font-bold py-4 px-6 rounded-2xl transition-all duration-300 shadow-[0_4px_15px_rgba(220,38,38,0.3)] hover:shadow-[0_8px_25px_rgba(220,38,38,0.5)] border border-red-400/20 hover:-translate-y-1 hover:scale-[1.02]">
                <i class="fa-brands fa-youtube mr-2 text-xl"></i> 
                <span class="text-lg tracking-wide">고목사클라쓰</span>
            </a>
        </div>
    </div>

</body>
</html>
