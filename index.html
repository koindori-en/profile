<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새제천교회 담임목사 소개</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Noto Serif KR (명조체 - 제목용), Noto Sans KR (고딕체 - 본문용) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #ffffff;
            color: #1a1a1a;
            /* 기본 폰트를 고딕으로 설정하고, 제목 등에 명조체를 적용 */
            font-family: 'Noto Sans KR', sans-serif; 
            overflow-x: hidden;
        }

        .font-serif-kr {
            font-family: 'Noto Serif KR', serif;
        }

        /* 등장 애니메이션 (아래에서 위로 부드럽게) */
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-up {
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .delay-100 { animation-delay: 100ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-500 { animation-delay: 500ms; }
        .delay-700 { animation-delay: 700ms; }

        /* 이미지 부드러운 스케일 및 하단 페이드아웃 효과 */
        .img-container img {
            /* 이미지 하단을 자연스럽게 페이드아웃시켜 하얀 배경과 연결 */
            mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
        }
        .img-zoom {
            transition: transform 1.5s ease;
        }
        .img-container:hover .img-zoom {
            transform: scale(1.03);
        }
    </style>
</head>
<body class="min-h-screen flex items-center antialiased bg-white">

    <div class="max-w-[1400px] w-full mx-auto px-6 sm:px-10 lg:px-16 py-12 lg:py-24">
        <div class="flex flex-col lg:flex-row gap-12 lg:gap-20 xl:gap-28 items-center lg:items-stretch">
            
            <!-- 왼쪽: 프로필 이미지 영역 -->
            <div class="w-full lg:w-5/12 xl:w-1/2 animate-fade-up delay-100">
                <div class="img-container relative w-full h-[500px] md:h-[600px] lg:h-full min-h-[600px] overflow-hidden rounded-sm bg-gray-50">
                    <img src="1000007608.jpg" alt="고목사 프로필 사진" 
                         class="img-zoom absolute inset-0 w-full h-full object-cover object-top">
                </div>
            </div>

            <!-- 오른쪽: 텍스트 및 정보 영역 -->
            <div class="w-full lg:w-7/12 xl:w-1/2 flex flex-col justify-center py-6 lg:py-12">
                
                <!-- 상단 서브타이틀 및 교회 표어 -->
                <div class="animate-fade-up delay-300">
                    <!-- 새로 추가된 교회 표어 -->
                    <p class="font-serif-kr text-lg md:text-xl text-gray-600 font-medium mb-3 leading-relaxed">
                        "예수의 제자로 함께 사는 새제천교회"
                    </p>
                    
                    <p class="text-gray-400 font-semibold tracking-[0.3em] uppercase text-xs md:text-sm mb-4">
                        Senior Pastor
                    </p>
                    
                    <!-- 메인 타이틀 -->
                    <h1 class="font-serif-kr text-4xl md:text-5xl lg:text-6xl font-semibold leading-tight text-gray-900 mb-6">
                        새제천교회<br>
                        담임목사 <span class="font-bold text-black">고목사</span>
                    </h1>
                    
                    <div class="w-12 h-[2px] bg-gray-900 mb-8"></div>
                </div>

                <!-- 목회 철학 / 인사말 (디자인을 위한 텍스트 추가) -->
                <div class="animate-fade-up delay-500 mb-12">
                    <p class="text-gray-500 text-lg md:text-xl font-light leading-relaxed mb-4 font-serif-kr">
                        "하나님의 말씀을 깊이 있게 연구하며,<br class="hidden sm:block">
                        진리에 뿌리내린 건강한 신앙 공동체를 세워갑니다."
                    </p>
                    <p class="text-gray-400 font-light text-sm md:text-base leading-loose">
                        새제천교회는 성도 한 사람 한 사람이 말씀 안에서 변화되고, 세상을 향해 사랑을 흘려보내는 축복의 통로가 되기를 소망합니다. 하나님이 기뻐하시는 교회, 이웃에게 희망이 되는 교회를 함께 만들어 가겠습니다.
                    </p>
                </div>

                <!-- 학력 정보 -->
                <div class="animate-fade-up delay-500 mb-12">
                    <h3 class="text-xs font-bold text-gray-400 tracking-widest uppercase mb-4">Profile & Education</h3>
                    <ul class="space-y-4">
                        <li class="flex items-start text-gray-700">
                            <i class="fa-solid fa-check text-gray-300 mt-1 mr-4 text-sm"></i>
                            <span class="text-base md:text-lg font-medium">총신대학원 <span class="text-gray-400 font-light ml-1">M.Div</span></span>
                        </li>
                        <li class="flex items-start text-gray-700">
                            <i class="fa-solid fa-check text-gray-300 mt-1 mr-4 text-sm"></i>
                            <span class="text-base md:text-lg font-medium">스텔렌보쉬 대학교 구약 <span class="text-gray-400 font-light ml-1">M.TH</span></span>
                        </li>
                    </ul>
                </div>

                <!-- 링크 버튼 (모던하고 세련된 스타일) -->
                <div class="animate-fade-up delay-700 flex flex-col sm:flex-row gap-4 mt-auto">
                    <!-- 새제천교회 버튼 (솔리드 스타일 - 색상 및 호버 효과 부드럽게 변경) -->
                    <a href="https://saejecheon.com" target="_blank" rel="noopener noreferrer" 
                       class="group flex items-center justify-center bg-zinc-800 text-white px-8 py-4 text-sm font-medium tracking-wide transition-all duration-300 hover:bg-zinc-700 shadow-sm hover:shadow-md rounded-sm">
                        <i class="fa-solid fa-church mr-3 opacity-70 group-hover:opacity-100 transition-opacity"></i>
                        새제천교회
                    </a>
                    
                    <!-- 유튜브 버튼 (아웃라인 스타일 - 호버 효과 부드럽게 변경) -->
                    <a href="https://www.youtube.com/@koclass" target="_blank" rel="noopener noreferrer" 
                       class="flex items-center justify-center border border-gray-300 text-gray-700 px-8 py-4 text-sm font-medium tracking-wide transition-all duration-300 hover:bg-gray-100 hover:border-gray-400 hover:text-gray-900 rounded-sm">
                        <i class="fa-brands fa-youtube mr-3 text-red-600 transition-colors"></i>
                        고목사클라쓰
                    </a>
                </div>
                
            </div>
        </div>
    </div>

</body>
</html>
