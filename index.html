<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고인국 목사 | 새제천교회</title>
    
    <!-- SEO 및 소셜 공유 메타태그 -->
    <meta name="description" content="새제천교회 담임목사 고인국 목사입니다. 주님의 심장으로 당신을 사랑합니다!">
    <meta property="og:title" content="고인국 목사 | 새제천교회">
    <meta property="og:description" content="주님의 심장으로 당신을 사랑합니다!">
    <meta property="og:image" content="1000007608.jpg">
    <meta property="og:url" content="https://saejecheon.com">

    <!-- 폰트 로드: 세련된 Noto Serif KR(제목용)과 Noto Sans KR(본문용) 혼합 사용 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- 아이콘 (Phosphor Icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Tailwind CSS (스타일링 프레임워크) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans KR"', 'sans-serif'],
                        serif: ['"Noto Serif KR"', 'serif'],
                    },
                    colors: {
                        primary: '#2C3E50', // 차분하고 신뢰감 있는 짙은 네이비/그레이
                        accent: '#EAE6DF', // 은은한 웜톤 배경
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 1s ease-out forwards',
                        'fade-in': 'fadeIn 1.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* 추가적인 부드러운 스크롤 및 선택 영역 색상 */
        ::selection { background: #2C3E50; color: white; }
        body { background-color: #FAFAF9; } /* 아주 연한 웜그레이 배경 */
        
        /* 이미지 컨테이너 부드러운 그림자 효과 */
        .image-shadow {
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col justify-center relative overflow-x-hidden">

    <!-- 장식용 배경 요소 (아주 연하게) -->
    <div class="absolute top-0 left-0 w-full h-96 bg-gradient-to-b from-accent/40 to-transparent -z-10"></div>

    <main class="max-w-6xl mx-auto px-6 py-16 md:py-24 w-full">
        
        <div class="grid grid-cols-1 md:grid-cols-12 gap-12 lg:gap-20 items-center">
            
            <!-- 왼쪽: 프로필 이미지 섹션 -->
            <div class="md:col-span-5 lg:col-span-5 opacity-0 animate-fade-in-up" style="animation-delay: 0.2s;">
                <div class="relative w-full aspect-[3/4] md:aspect-[4/5] rounded-2xl overflow-hidden image-shadow bg-gray-200">
                    <!-- 업로드해주신 사진 파일명 적용 -->
                    <img src="1000007608.jpg" alt="고인국 목사" class="object-cover w-full h-full object-top hover:scale-105 transition-transform duration-700 ease-in-out">
                    <!-- 이미지 안쪽 은은한 그라데이션 (텍스트 가독성이나 분위기를 위해) -->
                    <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent pointer-events-none"></div>
                </div>
            </div>

            <!-- 오른쪽: 정보 텍스트 및 버튼 섹션 -->
            <div class="md:col-span-7 lg:col-span-7 flex flex-col justify-center opacity-0 animate-fade-in-up" style="animation-delay: 0.4s;">
                
                <!-- 직분 -->
                <div class="mb-4">
                    <span class="inline-block border-b border-primary/30 pb-1 text-sm font-semibold tracking-widest text-primary/70 uppercase">
                        Senior Pastor
                    </span>
                    <p class="text-lg font-medium text-gray-500 mt-2">새제천교회 담임목사</p>
                </div>

                <!-- 이름 -->
                <h1 class="text-5xl lg:text-6xl font-serif font-bold text-gray-900 mb-8 tracking-tight">
                    고 인 국
                </h1>

                <!-- 핵심 문구 (Catchphrase) -->
                <div class="relative mb-10 pl-6 border-l-4 border-primary/20">
                    <i class="ph-fill ph-quotes text-3xl text-gray-200 absolute -top-4 -left-3"></i>
                    <p class="text-2xl lg:text-3xl font-serif text-gray-800 leading-snug break-keep">
                        "주님의 심장으로 <br class="hidden sm:block">당신을 사랑합니다!"
                    </p>
                </div>

                <!-- 학력 정보 -->
                <div class="mb-12 space-y-3">
                    <h3 class="text-sm font-bold text-gray-400 tracking-wider mb-4 uppercase">Education</h3>
                    <ul class="space-y-4">
                        <li class="flex items-start">
                            <i class="ph ph-graduation-cap text-xl text-primary mr-3 mt-0.5"></i>
                            <div>
                                <p class="font-medium text-gray-800">총신대학원</p>
                                <p class="text-sm text-gray-500">목회학 석사 (M.Div)</p>
                            </div>
                        </li>
                        <li class="flex items-start">
                            <i class="ph ph-scroll text-xl text-primary mr-3 mt-0.5"></i>
                            <div>
                                <p class="font-medium text-gray-800">스텔렌보쉬 대학교 (Stellenbosch University)</p>
                                <p class="text-sm text-gray-500">구약학 석사 (M.Th)</p>
                            </div>
                        </li>
                    </ul>
                </div>

                <!-- 연결 버튼 그룹 -->
                <div class="flex flex-col sm:flex-row gap-4">
                    <!-- 새제천교회 버튼 -->
                    <a href="https://saejecheon.com" target="_blank" rel="noopener noreferrer" 
                       class="group relative inline-flex items-center justify-center px-8 py-3.5 text-base font-medium text-white transition-all duration-300 bg-primary border border-transparent rounded-full hover:bg-gray-800 hover:-translate-y-1 hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
                        <i class="ph ph-church text-xl mr-2 group-hover:scale-110 transition-transform"></i>
                        새제천교회 방문하기
                    </a>
                    
                    <!-- 유튜브 버튼 -->
                    <a href="https://www.youtube.com/@koclass" target="_blank" rel="noopener noreferrer" 
                       class="group relative inline-flex items-center justify-center px-8 py-3.5 text-base font-medium text-gray-700 transition-all duration-300 bg-white border border-gray-300 rounded-full hover:border-red-500 hover:text-red-600 hover:-translate-y-1 hover:shadow-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                        <i class="ph ph-youtube-logo text-xl mr-2 group-hover:scale-110 transition-transform"></i>
                        유튜브 채널
                    </a>
                </div>

            </div>
        </div>
    </main>

    <!-- 하단 푸터 (간략하게) -->
    <footer class="w-full text-center py-8 text-sm text-gray-400 mt-auto opacity-0 animate-fade-in" style="animation-delay: 0.8s;">
        <p>&copy; 2026 새제천교회. All rights reserved.</p>
    </footer>

</body>
</html>
